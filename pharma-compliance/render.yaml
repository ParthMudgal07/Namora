services:
  - type: web
    name: nomora-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api_app:app --host 0.0.0.0 --port $PORT --app-dir .
    healthCheckPath: /health

  - type: web
    name: nomora-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
